<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Promotores - Mis Ventas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1, h2 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .login-box, .dashboard-box {
            transition: all 0.3s ease;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); }
        .error { background-color: #fed7d7; color: #9b2c2c; padding: 12px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .success { background-color: #c6f6d5; color: #22543d; padding: 12px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .loading { background-color: #e2e8f0; color: #4a5568; padding: 12px; border-radius: 8px; text-align: center; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 0.85rem;
        }
        th {
            background-color: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { background-color: #f9fafb; }
        .logout-btn {
            background: #e53e3e;
            margin-bottom: 20px;
            width: auto;
            padding: 8px 20px;
            display: inline-block;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .hidden { display: none; }
        @media (max-width: 768px) {
            th, td { font-size: 0.7rem; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection" class="login-box">
        <h1>🔐 Acceso Promotores</h1>
        <div class="subtitle">Ingresa con tu código y contraseña</div>
        
        <div class="form-group">
            <label>Código de Promotor</label>
            <input type="number" id="codigo" placeholder="Ej: 12345" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" required>
        </div>
        <button id="loginBtn">Iniciar sesión</button>
        <p style="text-align:center; margin-top:20px;">
            <a href="#" id="firstTimeLink">¿Primera vez? Crea tu contraseña aquí</a>
        </p>
        <div id="loginMessage"></div>
    </div>

    <div id="dashboardSection" class="dashboard-box hidden">
        <div class="header-bar">
            <h2>📊 Mis Registros de Ventas</h2>
            <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
        </div>
        <div id="registrosContainer">
            <div class="loading">Cargando tus registros...</div>
        </div>
    </div>

    <div id="firstTimeSection" class="login-box hidden">
        <h1>📝 Crear contraseña</h1>
        <div class="subtitle">Elige una contraseña para tu código de promotor</div>
        <div class="form-group">
            <label>Código de Promotor</label>
            <input type="number" id="newCodigo" readonly style="background:#edf2f7;">
        </div>
        <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" id="newPassword" required>
        </div>
        <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" id="confirmPassword" required>
        </div>
        <div class="form-group">
            <label>Tu nombre (opcional)</label>
            <input type="text" id="nombrePromotor" placeholder="Ej: Juan Pérez">
        </div>
        <button id="registerBtn">Guardar contraseña</button>
        <button id="backToLoginBtn" style="background:#718096;">Volver al inicio</button>
        <div id="registerMessage"></div>
    </div>
</div>

<script>
    // === CONFIGURACIÓN ===
    const SCRIPT_URL = window.APP_CONFIG ? window.APP_CONFIG.SCRIPT_URL : '';
    if (!SCRIPT_URL) alert('Error de configuración: falta la URL del script');    
    // Variables de estado
    let promotorActual = null;
    
    // Elementos del DOM
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const firstTimeSection = document.getElementById('firstTimeSection');
    const loginMessage = document.getElementById('loginMessage');
    
    // Funciones auxiliares
    function mostrarMensaje(elemento, texto, tipo) {
        elemento.innerHTML = `<div class="${tipo}">${texto}</div>`;
        setTimeout(() => { if (elemento.innerHTML === `<div class="${tipo}">${texto}</div>`) elemento.innerHTML = ''; }, 5000);
    }
    
    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const codigo = document.getElementById('codigo').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!codigo || !password) {
            mostrarMensaje(loginMessage, '❌ Completa ambos campos', 'error');
            return;
        }
        
        loginMessage.innerHTML = '<div class="loading">Verificando...</div>';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'verificarPromotor',
                    codigo: codigo,
                    contrasena: password
                })
            });
            const data = await response.json();
            
            if (data.exito) {
                promotorActual = codigo;
                localStorage.setItem('promotorCodigo', codigo);
                mostrarMensaje(loginMessage, `✅ Bienvenido, ${data.nombre || 'Promotor'}`, 'success');
                setTimeout(() => {
                    loginSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    cargarRegistros();
                }, 1000);
            } else {
                if (data.primeraVez) {
                    // Mostrar pantalla de creación de contraseña
                    document.getElementById('newCodigo').value = codigo;
                    loginSection.classList.add('hidden');
                    firstTimeSection.classList.remove('hidden');
                    document.getElementById('registerMessage').innerHTML = '';
                } else {
                    mostrarMensaje(loginMessage, `❌ ${data.error}`, 'error');
                }
            }
        } catch (error) {
            mostrarMensaje(loginMessage, `❌ Error de conexión: ${error.message}`, 'error');
        }
    });
    
    // Registro de primera vez
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const codigo = document.getElementById('newCodigo').value.trim();
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const nombre = document.getElementById('nombrePromotor').value.trim();
        
        if (!newPass || newPass.length < 4) {
            mostrarMensaje(document.getElementById('registerMessage'), '❌ La contraseña debe tener al menos 4 caracteres', 'error');
            return;
        }
        if (newPass !== confirmPass) {
            mostrarMensaje(document.getElementById('registerMessage'), '❌ Las contraseñas no coinciden', 'error');
            return;
        }
        
        document.getElementById('registerMessage').innerHTML = '<div class="loading">Guardando...</div>';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'registrarPromotor',
                    codigo: codigo,
                    contrasena: newPass,
                    nombre: nombre
                })
            });
            const data = await response.json();
            
            if (data.exito) {
                mostrarMensaje(document.getElementById('registerMessage'), '✅ Contraseña guardada. Ahora puedes iniciar sesión.', 'success');
                setTimeout(() => {
                    firstTimeSection.classList.add('hidden');
                    loginSection.classList.remove('hidden');
                    document.getElementById('password').value = '';
                    document.getElementById('codigo').value = codigo;
                }, 2000);
            } else {
                mostrarMensaje(document.getElementById('registerMessage'), `❌ Error: ${data.error}`, 'error');
            }
        } catch (error) {
            mostrarMensaje(document.getElementById('registerMessage'), `❌ Error: ${error.message}`, 'error');
        }
    });
    
    // Cargar registros del promotor
    async function cargarRegistros() {
        const container = document.getElementById('registrosContainer');
        container.innerHTML = '<div class="loading">Cargando tus registros...</div>';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'obtenerRegistrosPorPromotor',
                    codigoPromotor: promotorActual
                })
            });
            const data = await response.json();
            
            if (data.exito && data.registros) {
                if (data.registros.length === 0) {
                    container.innerHTML = '<div class="success">📭 No tienes registros de ventas aún.</div>';
                    return;
                }
                
                // Construir tabla
                const encabezados = Object.keys(data.registros[0]);
                let html = '<div style="overflow-x: auto;"><table><thead><tr>';
                encabezados.forEach(enc => {
                    html += `<th>${enc}</th>`;
                });
                html += '</tr></thead><tbody>';
                
                data.registros.forEach(reg => {
                    html += '<tr>';
                    encabezados.forEach(enc => {
                        let valor = reg[enc] !== undefined ? reg[enc] : '';
                        if (valor && valor.toString().startsWith('http')) {
                            valor = `<a href="${valor}" target="_blank">Ver archivo</a>`;
                        }
                        html += `<td>${valor}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div class="error">❌ Error al cargar: ${data.error || 'Desconocido'}</div>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="error">❌ Error de conexión: ${error.message}</div>`;
        }
    }
    
    // Cerrar sesión
    document.getElementById('logoutBtn').addEventListener('click', () => {
        promotorActual = null;
        localStorage.removeItem('promotorCodigo');
        dashboardSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        document.getElementById('codigo').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginMessage').innerHTML = '';
    });
    
    // Botones de navegación
    document.getElementById('firstTimeLink').addEventListener('click', (e) => {
        e.preventDefault();
        const codigo = document.getElementById('codigo').value.trim();
        if (!codigo) {
            mostrarMensaje(loginMessage, '⚠️ Primero escribe tu código de promotor', 'error');
            return;
        }
        document.getElementById('newCodigo').value = codigo;
        loginSection.classList.add('hidden');
        firstTimeSection.classList.remove('hidden');
    });
    
    document.getElementById('backToLoginBtn').addEventListener('click', () => {
        firstTimeSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        document.getElementById('registerMessage').innerHTML = '';
    });
    
    // Si ya había sesión guardada, intentar auto-login
    const savedCodigo = localStorage.getItem('promotorCodigo');
    if (savedCodigo) {
        document.getElementById('codigo').value = savedCodigo;
        // No auto-login por seguridad, pero puede mostrar un mensaje
        console.log('Código guardado encontrado. Ingresa tu contraseña.');
    }
</script>
</body>
</html>
